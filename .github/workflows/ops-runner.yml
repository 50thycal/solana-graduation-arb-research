name: Ops Runner

# Self-service bridge: runs automatically when `ops/request.json` changes on the
# `ops` branch (a push Claude makes), so Railway logs / read-only DB queries can
# be fetched WITHOUT a manual "Run workflow" click. Claude's web session can read
# workflow runs but cannot dispatch them, so this push-trigger is the automation
# path. Results land in this job's log AND are committed back to the ops branch as
# `ops/result.txt`, so Claude can read them over plain git (no API needed).
#
# The push trigger filters on ops/request.json only, so the result commit can
# never retrigger the workflow.
#
# This workflow lives ONLY on the `ops` branch by design — `main` and the Railway
# worker are never touched by ops requests (Railway deploys from the default branch).

on:
  push:
    branches: [ops]
    paths:
      - "ops/request.json"

permissions:
  contents: write # to push ops/result.txt back to the ops branch

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run ops request
        env:
          # Railway platform logs (railway_logs.py)
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          # Read-only DB endpoint (db_query.py -> POST /api/db-query)
          DB_QUERY_URL: ${{ secrets.DB_QUERY_URL }}
          DB_QUERY_TOKEN: ${{ secrets.DB_QUERY_TOKEN }}
        run: |
          set -o pipefail
          python scripts/ops_runner.py 2>&1 | tee ops/result.txt

      - name: Publish result to ops branch
        if: always()
        run: |
          git config user.name "ops-runner"
          git config user.email "ops-runner@users.noreply.github.com"
          git add ops/result.txt
          if ! git diff --cached --quiet; then
            git commit -m "ops: result [skip ci]"
            git pull --rebase origin ops || true
            git push origin HEAD:ops
          fi
